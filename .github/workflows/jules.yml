name: Jules AI Agent

# 設定觸發條件：當新增 Issue 或在 Issue 底下留言時啟動
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  run-jules:
    runs-on: ubuntu-latest
    steps:
      # 允許腳本讀取你的程式碼
      - name: Checkout code
        uses: actions/checkout@v4
      
# 截圖中的 Jules Invoke 語法與完整授權
      - name: Jules Invoke
        uses: BeksOmega/jules-action@v1.0.0
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
        env:
          # 雖然 Action 本身不吃這個 input，但 GitHub 底層推播 PR 時仍需要它
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}