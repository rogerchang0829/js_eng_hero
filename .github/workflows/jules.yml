name: Jules AI Agent

# 設定觸發條件：當新增 Issue 或在 Issue 底下留言時啟動
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  run-jules:
    runs-on: ubuntu-latest
    steps:
      # 允許腳本讀取你的程式碼
      - name: Checkout code
        uses: actions/checkout@v4
      
# 截圖中的 Jules Invoke 語法與完整授權
      - name: Jules Invoke
        uses: BeksOmega/jules-action@v1.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.JULES_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.JULES_API_KEY }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}